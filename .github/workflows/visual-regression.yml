name: Visual Regression

on:
  pull_request:
    # TODO(alex): re-add paths filter (src/**, apps/docs/**) at the JOB level
    # once required-status-checks rule allows skipped-by-paths to satisfy.
    # Workflow-level paths filter prevents the check from registering at all
    # on PRs that don't touch the path, which blocks merge when required.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # TODO(alex): remove `if: false` once `apps/docs` path is confirmed
    # and the monorepo tool decision (npm workspaces vs pnpm vs Turbo) lands.
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: false
          onlyChanged: true
