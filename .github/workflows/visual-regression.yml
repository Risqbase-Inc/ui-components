name: Visual Regression

on:
  pull_request:
    paths:
      - 'src/**'
      - 'apps/docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    # TODO(alex): remove `if: false` once `apps/docs` path is confirmed
    # and the monorepo tool decision (npm workspaces vs pnpm vs Turbo) lands.
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: false
          onlyChanged: true
