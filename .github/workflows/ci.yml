name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps since v2.0.0 — Radix Dialog + visx land as
        # peerDependencies (with visx flagged optional in
        # peerDependenciesMeta); their peer graphs aren't strict, so
        # npm's default resolver bails.
        run: npm ci --legacy-peer-deps

      - name: Token lint
        run: npm run lint:tokens

      - name: Lint
        run: npm run lint

      - name: Token build
        run: npm run build:tokens

      - name: Build
        run: npm run build

      # BRIEF-436 — docs site drift check. The public/*.html files are
      # generator output (tools/docs-build/). If a PR touches CHANGELOG.md,
      # src/, package.json, etc. without re-running `npm run docs:build`,
      # the on-disk HTML drifts from what the generator would emit. This
      # gate fails the PR with a clear remediation message.
      - name: Docs site drift check
        run: npm run docs:check

      # README drift check. The <!-- AUTOGEN --> blocks in README.md (status,
      # imports, components, releases) are generator output (tools/readme-build/),
      # reusing the same source-of-truth extractors as the docs site. If a PR
      # bumps the version, adds a component, or cuts a release without re-running
      # `npm run readme:build`, this gate fails with a clear remediation message.
      - name: README drift check
        run: npm run readme:check

      # v4.3 §11.1 row 8 — contrast verification. Non-blocking informational
      # step initially; promote to blocking once any baseline failures are
      # resolved. See scripts/verify-contrast.mjs for the methodology.
      - name: Verify contrast (informational)
        continue-on-error: true
        run: npm run verify:contrast
