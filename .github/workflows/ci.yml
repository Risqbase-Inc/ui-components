name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps since v2.0.0 — Radix Dialog + visx land as
        # peerDependencies (with visx flagged optional in
        # peerDependenciesMeta); their peer graphs aren't strict, so
        # npm's default resolver bails.
        run: npm ci --legacy-peer-deps

      - name: Token lint
        run: npm run lint:tokens

      - name: Lint
        run: npm run lint

      - name: Token build
        run: npm run build:tokens

      - name: Build
        run: npm run build
