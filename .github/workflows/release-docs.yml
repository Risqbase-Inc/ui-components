name: Release Docs Regen

# release-please opens its release PR bumping package.json + CHANGELOG.md but
# does NOT regenerate the committed public/*.html (or the README autogen blocks),
# so docs:check (in "Lint & Build") flags version drift on the release PR itself.
#
# This job regenerates them on the release branch so the release PR goes green
# AND the eventual merge commit is already correct (no post-merge heal window).
# It complements docs-publish.yml, which only fires on the post-merge push to main.
#
# Pushes with RELEASE_PLEASE_TOKEN (a PAT) on purpose: a commit pushed with the
# default GITHUB_TOKEN would NOT re-trigger Lint & Build, leaving the check stale.
# The diff-guard makes it idempotent — the re-triggered run finds no drift and exits.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: release-docs-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  regen:
    name: Regenerate docs on release PR
    # Only the release-please branch — every normal PR skips this job.
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # docs:build/readme:build run on bare Node, but the v4.4 agent-surface
      # generator parses component types with the typescript package — so the
      # release PR regen needs an install (the version bump changes
      # registry.json's `package` field, which would otherwise trip the R14
      # agent:check gate).
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Regenerate docs + README + agent surface
        run: |
          npm run docs:build
          npm run readme:build --if-present
          npm run build:agent-surface

      - name: Commit regenerated files if changed
        run: |
          if git diff --quiet public/ README.md mcp/registry.json; then
            echo "No drift — public/, README.md and mcp/registry.json already current for this release."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ README.md mcp/registry.json
          git commit -m "chore(docs): regenerate docs + agent surface for release"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
