name: Publish Package

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@risqbase-inc'
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps required since v2.0.0 — Radix Dialog + visx land as
        # peerDependencies; npm strict resolution fails on visx@3.x ↔ React 18
        # peer constraint even though resolved versions are compatible. Pattern
        # matches every other workflow in .github/workflows/ (ci, chromatic,
        # docs-publish). Without this, publish silently fails on every release
        # (v2.0.0, v2.1.0, v2.1.1 all failed — fixed 2026-05-20).
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # v4.4 D-109 / Workstream D — Code Connect publish. Inert until the
      # org plan + FIGMA_ACCESS_TOKEN secret exist (see figma/README.md:
      # blocked on student-tier/View-seat access at v4.4 ship time).
      - name: Publish Figma Code Connect mappings
        if: ${{ secrets.FIGMA_ACCESS_TOKEN != '' }}
        run: npx --yes @figma/code-connect connect publish --config figma/figma.config.json
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}

      # v4.4 D-101 — the MCP package ships in lockstep (linked-versions in
      # release-please-config.json keeps the version identical). The
      # registry snapshot was regenerated by `npm run build` above.
      - name: Publish MCP package to GitHub Packages
        run: npm publish
        working-directory: mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
