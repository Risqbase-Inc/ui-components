name: 'Chromatic'

# Two triggers — main-branch pushes lock the canonical baseline (and
# auto-accept once reviewed via `--auto-accept-changes main`), PRs run
# against that baseline. v4.3 PR 2 of the programme.
#
# Gating model: this job only asserts "Storybook built and uploaded" and
# exits 0 even when visual changes are found (--exit-zero-on-changes).
# The merge gate is Chromatic's own "UI Tests" commit status, posted by
# its GitHub App: it stays *pending* while changes await review and flips
# to success in place when baselines are accepted — no Actions re-run.
# See docs/devops/branch-protection.md.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default (CodeQL: workflow-does-not-contain-permissions).
# Chromatic uploads via CHROMATIC_PROJECT_TOKEN and reports status through its
# own GitHub App, not GITHUB_TOKEN — so read-only repo contents (for checkout)
# is all this workflow needs.
permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0    # Required for baseline diffing + TurboSnap
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      # Radix + visx are peer-deps; consumers may not have them. Local
      # devDependencies mirror them so npm has something to install,
      # but the peer graph isn't strict — use --legacy-peer-deps.
      - run: npm ci --legacy-peer-deps
      - run: npm run build:tokens
      # Locked CLI from devDependencies (chromatic@16) instead of
      # chromaui/action — the action's v11 runtime is Node 20, deprecated
      # on GitHub runners (forced to Node 24 from 2026-06-16).
      - run: >-
          npx chromatic
          --build-script-name build:storybook
          --only-changed
          --exit-zero-on-changes
          --auto-accept-changes main
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
