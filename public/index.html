<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>RisqBase Design System — coming soon</title>
  <style>
    :root {
      --indigo-600: #4F46E5;
      --indigo-700: #4338CA;
      --gray-50: #F9FAFB;
      --gray-200: #E5E7EB;
      --gray-500: #6B7280;
      --gray-900: #111827;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Geist Sans', system-ui, -apple-system, BlinkMacSystemFont,
                   'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 36rem;
      width: 100%;
    }
    .eyebrow {
      color: var(--indigo-600);
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 0.75rem;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 600;
      margin: 0 0 1rem;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--gray-500);
      margin: 0 0 1.25rem;
      font-size: 1.0625rem;
    }
    a {
      color: var(--indigo-600);
      font-weight: 500;
      text-decoration: none;
    }
    a:hover { color: var(--indigo-700); text-decoration: underline; }
    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gray-200);
      font-size: 0.875rem;
      color: var(--gray-500);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Design System v4.2</p>
    <h1>RisqBase Design System</h1>
    <p>The documentation site is being built. While we ship, the v4.2 specification, plan, audit, and implementation plan live in the repository.</p>
    <p>
      <a href="https://github.com/Risqbase-Inc/ui-components/tree/main/docs/design-system/v4.2">Read the v4.2 documentation on GitHub →</a>
    </p>
    <div class="footer">
      design.risqbase.com — maintained by RisqBase
    </div>
  </main>
</body>
</html>
